<!DOCTYPE html>
<html>
<head>
  <title>Doodley Games</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
    }

    h1 {
      color: #00ffcc;
      font-size: 38px;
      margin-top: 15px;
    }

    p.subtitle {
      color: #aaa;
      font-size: 18px;
    }

    .group-pfp {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #00ffcc;
      margin-top: 10px;
    }

    .games {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    .game {
      background: #1b1b1b;
      margin: 15px;
      padding: 15px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      box-shadow: 0 0 10px #00ffcc55;
    }

    .game img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Doodley Games 🎮</h1>
<p class="subtitle">We make da ez games 😎</p>

<!-- 👇 GROUP PFP -->
<img class="group-pfp" src="https://tr.rbxcdn.com/180DAY-c7b1be888c7456863b0a7b9e88aeaf15/150/150/Image/Webp/noFilter">

<p>Official Roblox Group Website</p>

<!-- 🎮 GAMES -->
<div class="games">

  <!-- Game 1 -->
  <div class="game">
    <img src="https://www.roblox.com/asset-thumbnail/image?assetId=87987474247515&width=768&height=432&format=png">
    <h3>Homeless Test</h3>
    <a class="btn" href="https://www.roblox.com/games/87987474247515" target="_blank">Play</a>
  </div>

  <!-- Game 2 -->
  <div class="game">
    <img src="https://www.roblox.com/asset-thumbnail/image?assetId=137926212841407&width=768&height=432&format=png">
    <h3>Click for Brainrots</h3>
    <a class="btn" href="https://www.roblox.com/games/137926212841407" target="_blank">Play</a>
  </div>

</div>

<!-- 👥 GROUP -->
<a class="btn" href="https://www.roblox.com/share/g/142614812" target="_blank">
Join Group
</a>

</body>
</html>
