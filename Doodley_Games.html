<!DOCTYPE html>

  <style>

      background-repeat: repeat-y; background-position: top center; background-color:#000;
      min-height:100vh;

    .overlay {background: rgba(0,0,0,.75); min-height:100vh; padding-bottom:40px;}

    h3{text-align:center;margin-top:10px;}
    .btn {display:block;margin:10px auto 0 auto;padding:10px 15px;background:#00ffcc;color:black;text-decoration:none;border-radius:10px;font-weight:bold;width:fit-content;}
    .group-card {display:flex;align-items:center;justify-content:center;gap:12px;margin:25px auto;padding:12px 18px;width:90%;max-width:300px;background:#1b1b1bcc;border-radius:15px;box-shadow:0 0 10px #00ffcc55;text-decoration:none;color:white;font-weight:bold;}
    .group-card img {width:50px;height:50px;border-radius:50%;border:2px solid #00ffcc;}
  </style>
</head>
